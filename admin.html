<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malicoin - Direction Générale</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --mali-green: #00913a; --mali-yellow: #fcd116; --mali-red: #ce1126; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .header { text-align: center; padding: 20px; background: #1e1e1e; border-radius: 15px; border-bottom: 4px solid var(--mali-yellow); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #252525; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .stat-card h2 { color: var(--mali-green); margin: 5px 0; }
        
        .section-title { color: var(--mali-yellow); font-size: 1.2em; margin: 20px 0 10px 0; display: flex; align-items: center; gap: 10px; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #444; }
        .card.active { border-left-color: var(--mali-green); }
        .card.special { border-left-color: var(--mali-yellow); background: #222; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 12px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-ok { background: var(--mali-green); color: white; }
        .btn-no { background: var(--mali-red); color: white; }
        .btn-gold { background: var(--mali-yellow); color: black; }
        
        .img-preview { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #444; }
        input { width: 100%; padding: 15px; background: #252525; border: 1px solid #444; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        
        /* Style Historique Admin */
        .hist-box { max-height: 250px; overflow-y: auto; background: #1a1a1a; padding: 10px; border-radius: 8px; font-size: 13px; }
        .hist-line { padding: 8px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .type-tag { font-size: 10px; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; }
        .tag-achat { background: #004d40; color: #4db6ac; }
        .tag-travail { background: #1a237e; color: #7986cb; }
        .tag-emission { background: #4a148c; color: #ce93d8; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-admin" class="header">
        <h1>🔐 Admin Malicoin</h1>
        <input type="password" id="admin-key" placeholder="Entrez le code secret">
        <button class="btn-ok" onclick="connexion()">Ouvrir le coffre-fort</button>
    </div>

    <div id="content-admin" class="hidden">
        <div class="header">
            <p>Mon Portefeuille (Gains Frais) 👑</p>
            <h1 id="mon-solde-admin" style="color: var(--mali-yellow);">0 MLC</h1>
        </div>

        <div class="card special">
            <h4>💸 Transférer ou Émettre</h4>
            <input type="tel" id="admin-dest" placeholder="Numéro destinataire (+223...)">
            <input type="number" id="admin-montant" placeholder="Montant MLC">
            <div class="btn-group">
                <button class="btn-ok" onclick="actionMonnaie('transfert')">Envoyer mes Gains</button>
                <button class="btn-gold" onclick="actionMonnaie('emission')">Émettre (Création)</button>
            </div>
        </div>

        <div class="card">
            <h4>📜 Journal des Opérations</h4>
            <div id="admin-hist-list" class="hist-box">Chargement du journal...</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <small>Achats CFA</small>
                <h2 id="count-achats">0</h2>
            </div>
            <div class="stat-card">
                <small>Travaux</small>
                <h2 id="count-travaux">0</h2>
            </div>
        </div>

        <div class="section-title">💳 Demandes de Recharge (CFA)</div>
        <div id="recharges-list">Chargement...</div>

        <div class="section-title">🏗️ Validation des Travaux</div>
        <div id="travaux-list">Chargement...</div>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAzhSslKnrPOsgmxtR8OTqv__QCR-5geSU",
    authDomain: "malicoin.firebaseapp.com",
    databaseURL: "https://malicoin-default-rtdb.firebaseio.com",
    projectId: "malicoin",
    storageBucket: "malicoin.appspot.com",
    messagingSenderId: "728024400418",
    appId: "1:728024400418:web:45616567fc3aa9e02a007b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MON_NUMERO_ADMIN = "+22396804164"; 

function connexion() {
    const key = document.getElementById('admin-key').value;
    if(key === "MALI2024") {
        document.getElementById('login-admin').classList.add('hidden');
        document.getElementById('content-admin').classList.remove('hidden');
        initAdmin();
    } else { alert("Accès refusé !"); }
}

function initAdmin() {
    db.ref('users/' + MON_NUMERO_ADMIN + '/solde').on('value', s => {
        document.getElementById('mon-solde-admin').innerText = (s.val() || 0) + " MLC";
    });

    // Charger l'Historique Global (Journal)
    db.ref('transactions').on('value', snap => {
        let h = "";
        const data = snap.val();
        if(data) {
            Object.keys(data).reverse().forEach(id => {
                const t = data[id];
                const date = new Date(t.date).toLocaleDateString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                let tag = t.type === "EMISSION" ? "tag-emission" : "tag-achat";
                h += `<div class="hist-line">
                    <div>
                        <span class="type-tag ${tag}">${t.type || 'TRANSFERT'}</span><br>
                        ${t.destinataire}
                    </div>
                    <div style="text-align:right">
                        <b>${t.montant} MLC</b><br>
                        <span style="color:#666; font-size:10px;">${date}</span>
                    </div>
                </div>`;
            });
        }
        document.getElementById('admin-hist-list').innerHTML = h || "Aucune opération.";
    });

    // Recharges
    db.ref('demandes_achats').orderByChild('statut').equalTo('en_attente').on('value', snap => {
        let h = ""; let count = 0;
        snap.forEach(d => {
            count++; const val = d.val();
            h += `<div class="card active"><p>👤 <b>${val.utilisateur}</b> : ${val.montant} MLC<br><small>Réf: ${val.reference || 'N/A'}</small></p>
            <button class="btn-ok" onclick="validerAchat('${d.key}', '${val.utilisateur}', ${val.montant})">CFA REÇU ✅</button></div>`;
        });
        document.getElementById('recharges-list').innerHTML = h || "Rien en attente.";
        document.getElementById('count-achats').innerText = count;
    });

    // Travaux
    db.ref('demandes_minage').orderByChild('statut').equalTo('en_attente').on('value', snap => {
        let h = ""; let count = 0;
        snap.forEach(d => {
            count++; const val = d.val();
            h += `<div class="card active"><p>👷 <b>${val.utilisateur}</b></p>
            <img src="${val.photo_avant}" class="img-preview"><img src="${val.photo_apres}" class="img-preview">
            <div class="btn-group"><button class="btn-ok" onclick="validerTravail('${d.key}', '${val.utilisateur}')">PAYER 500 MLC</button>
            <button class="btn-no" onclick="rejeter('${d.key}')">REJETER</button></div></div>`;
        });
        document.getElementById('travaux-list').innerHTML = h || "Pas de travaux.";
        document.getElementById('count-travaux').innerText = count;
    });
}

function actionMonnaie(type) {
    const dest = document.getElementById('admin-dest').value.trim();
    const montant = parseInt(document.getElementById('admin-montant').value);
    if(!dest || isNaN(montant)) return alert("Infos manquantes");

    if(type === 'transfert') {
        db.ref('users/' + MON_NUMERO_ADMIN + '/solde').transaction(actuel => {
            if (actuel >= montant) {
                db.ref('users/' + dest + '/solde').transaction(s => (s || 0) + montant);
                db.ref('transactions').push({ expediteur: "ADMIN", destinataire: dest, montant: montant, type: "TRANSFERT ADMIN", date: Date.now() });
                alert("Transfert réussi !");
                return actuel - montant;
            } else { alert("Solde insuffisant"); return; }
        });
    } else {
        if(confirm("Confirmer l'émission de " + montant + " MLC ?")) {
            db.ref('users/' + dest + '/solde').transaction(s => (s || 0) + montant);
            db.ref('transactions').push({ expediteur: "SYSTEME", destinataire: dest, montant: montant, type: "EMISSION", date: Date.now() });
            alert("Émission réussie !");
        }
    }
}

function validerAchat(id, phone, montant) {
    db.ref('users/' + phone + '/solde').transaction(s => (s || 0) + montant);
    db.ref('transactions').push({ expediteur: "VENTE CFA", destinataire: phone, montant: montant, type: "RECHARGE", date: Date.now() });
    db.ref('demandes_achats/' + id).update({ statut: "termine" });
}

function validerTravail(id, phone) {
    db.ref('users/' + phone).transaction(u => {
        if(u) { u.solde = (u.solde || 0) + 500; u.jours_actifs = (u.jours_actifs || 0) + 1; }
        return u;
    });
    db.ref('transactions').push({ expediteur: "MINAGE", destinataire: phone, montant: 500, type: "TRAVAIL", date: Date.now() });
    db.ref('demandes_minage/' + id).update({ statut: "termine" });
}

function rejeter(id) { db.ref('demandes_minage/' + id).remove(); }
</script>
</body>
  </html>
